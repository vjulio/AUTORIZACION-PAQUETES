name: Publish Middleware

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./AutorizacionMiddleware/Autorizacion.Middleware/Autorizacion.Middleware.csproj

      - name: Build
        run: dotnet build ./AutorizacionMiddleware/Autorizacion.Middleware/Autorizacion.Middleware.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ./AutorizacionMiddleware/Autorizacion.Middleware/Autorizacion.Middleware.csproj --configuration Release --no-build

      - name: Upload Artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autorizacion
          path: ./AutorizacionMiddleware/Autorizacion.Middleware/bin/Release/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Show Artifact Link
        run: |
          echo "## Paquete generado" >> "$GITHUB_STEP_SUMMARY"
          echo "[Descargar artifact Autorizacion](${{ steps.upload_artifact.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"

  release:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Autorizacion
          path: ./Autorizacion

      - name: List Files
        run: ls -R

      - name: Add GitHub NuGet Source
        run: |
          dotnet nuget add source \
            --username vjulio \
            --password "${{ secrets.AUTORIZACION_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/vjulio/index.json"

      - name: Publish Package
        run: |
          dotnet nuget push "./Autorizacion/*.nupkg" \
            --api-key "${{ secrets.AUTORIZACION_TOKEN }}" \
            --source github \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            ./Autorizacion/*.nupkg
